<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Thuis Kracht Vrouwen</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#030308;color:#e8e8f0;font-family:"Barlow Condensed",sans-serif;min-height:100vh;overflow-x:hidden}
.page{position:relative;z-index:2}
.wrap{max-width:820px;margin:0 auto;padding:18px 13px 120px}
.bg-glow{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-glow .g1{position:absolute;top:-200px;left:-200px;width:600px;height:600px;border-radius:50%;animation:drift1 12s ease-in-out infinite alternate}
.bg-glow .g2{position:absolute;bottom:-200px;right:-200px;width:700px;height:700px;border-radius:50%;animation:drift2 15s ease-in-out infinite alternate}
.scanlines{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1}
@keyframes drift1{from{transform:translate(0,0)}to{transform:translate(80px,60px)}}
@keyframes drift2{from{transform:translate(0,0)}to{transform:translate(-60px,-40px)}}
header{position:relative;z-index:2;padding:36px 18px 28px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);overflow:hidden}
.header-bg{position:absolute;inset:0;opacity:0.04;transition:background 1s}
.hl{font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:5px;margin-bottom:10px;text-transform:uppercase;transition:color 0.5s,text-shadow 0.5s}
h1{font-family:"Bebas Neue",sans-serif;font-size:clamp(52px,14vw,104px);font-weight:400;letter-spacing:6px;line-height:0.82;margin-bottom:12px;color:#fff;transition:text-shadow 0.5s}
.hs{font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#e8e8f0}
.neon-line{width:80px;height:2px;margin:13px auto 0;transition:background 0.5s,box-shadow 0.5s}
.statsbar{display:flex;margin-bottom:16px;background:rgba(0,0,0,0.5);border:1px solid #1a1a2e;transition:border-color 0.5s}
.sbar-item{flex:1;padding:10px 7px;text-align:center;border-right:1px solid #1a1a2e}
.sbar-item:last-child{border-right:none}
.sbar-val{font-family:"Bebas Neue",sans-serif;font-size:24px;letter-spacing:2px;transition:color 0.5s}
.sbar-lbl{font-family:"Share Tech Mono",monospace;font-size:7px;color:#888aaa;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.fase-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fbtn{flex:1;min-width:110px;padding:10px 10px 8px;background:rgba(0,0,0,0.5);border:1px solid #1a1a2e;cursor:pointer;text-align:left;color:#e8e8f0;font-family:"Barlow Condensed",sans-serif;transition:all 0.2s;position:relative;overflow:hidden}
.fw{font-family:"Share Tech Mono",monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.fn{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.fd{font-size:10px;color:#e8e8f0;margin-top:2px;font-family:"Share Tech Mono",monospace}
.fprog{position:absolute;bottom:0;left:0;height:2px;transition:width 0.6s ease,background 0.5s}
.finfo{padding:8px 13px;background:rgba(0,0,0,0.4);border-left:2px solid;margin-bottom:12px;font-size:10px;font-family:"Share Tech Mono",monospace;letter-spacing:1px;color:#e8e8f0;transition:all 0.5s}
.tabs{display:flex;gap:5px;margin-bottom:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.tab-group{display:flex;gap:5px;flex-wrap:wrap}
.tbtn{padding:8px 11px;background:rgba(0,0,0,0.5);border:1px solid #1a1a2e;cursor:pointer;color:#aaaacc;font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;transition:all 0.2s}
.svd{font-size:9px;font-family:"Share Tech Mono",monospace;display:none;letter-spacing:2px}
.timer-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(3,3,8,0.97);border-top:2px solid;padding:12px 16px;backdrop-filter:blur(16px)}
.timer-bar.active{display:block;animation:slideup 0.3s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.timer-inner{max-width:820px;margin:0 auto;display:flex;align-items:center;gap:12px}
.timer-info{min-width:72px}
.timer-label{font-family:"Share Tech Mono",monospace;font-size:7px;color:#888aaa;letter-spacing:2px;margin-bottom:1px}
.timer-count{font-family:"Bebas Neue",sans-serif;font-size:42px;letter-spacing:4px;line-height:1;transition:color 0.3s}
.timer-track{flex:1;height:4px;background:#1a1a2e;border-radius:2px;overflow:hidden}
.timer-fill{height:100%;border-radius:2px;transition:width 0.9s linear,background 0.3s}
.timer-skip{padding:6px 13px;background:transparent;border:1px solid #2a2a3e;color:#e8e8f0;font-family:"Share Tech Mono",monospace;font-size:9px;cursor:pointer;letter-spacing:2px;white-space:nowrap}
.timer-oef{font-family:"Share Tech Mono",monospace;font-size:8px;color:#888aaa;letter-spacing:1px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.pr-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;background:#030308;border:2px solid #ffd700;padding:26px 32px;text-align:center;box-shadow:0 0 60px rgba(255,215,0,0.4)}
.pr-popup.show{display:block;animation:prpop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes prpop{from{opacity:0;transform:translate(-50%,-60%) scale(0.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.pr-popup h2{font-family:"Bebas Neue",sans-serif;font-size:48px;color:#ffd700;letter-spacing:4px}
.pr-popup p{font-family:"Share Tech Mono",monospace;font-size:10px;color:#aaaacc;letter-spacing:2px;margin-top:5px}
.pr-close{margin-top:12px;padding:6px 16px;background:transparent;border:1px solid #ffd700;color:#ffd700;font-family:"Share Tech Mono",monospace;font-size:9px;cursor:pointer;letter-spacing:2px}
.reset-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;backdrop-filter:blur(6px)}
.reset-overlay.show{display:flex;align-items:center;justify-content:center}
.reset-box{background:#030308;border:2px solid #ff3333;padding:26px 22px;text-align:center;max-width:285px;width:90%;box-shadow:0 0 50px rgba(255,50,50,0.2);animation:prpop 0.3s ease}
.reset-box h2{font-family:"Bebas Neue",sans-serif;font-size:30px;color:#ff4444;letter-spacing:4px;margin-bottom:7px}
.reset-box p{font-family:"Share Tech Mono",monospace;font-size:10px;color:#e8e8f0;letter-spacing:1px;line-height:1.7;margin-bottom:12px}
.reset-warn{font-family:"Share Tech Mono",monospace;font-size:8px;color:#ff4444;letter-spacing:2px;margin-bottom:15px;border:1px solid #ff333433;padding:5px}
.reset-btns{display:flex;gap:7px;justify-content:center}
.reset-confirm{padding:7px 16px;background:rgba(255,50,50,0.1);border:1px solid #ff3333;color:#ff4444;font-family:"Share Tech Mono",monospace;font-size:9px;cursor:pointer;letter-spacing:2px}
.reset-cancel{padding:7px 16px;background:transparent;border:1px solid #2a2a3e;color:#e8e8f0;font-family:"Share Tech Mono",monospace;font-size:9px;cursor:pointer;letter-spacing:2px}
.sdiv{display:flex;align-items:center;gap:10px;margin:22px 0 14px}
.sdiv::before,.sdiv::after{content:"";flex:1;height:1px;background:#1a1a2e}
.sdiv span{font-family:"Share Tech Mono",monospace;font-size:8px;color:#e8e8f0;letter-spacing:4px;text-transform:uppercase}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px}
footer{margin-top:28px;padding:14px 14px 28px;text-align:center;border-top:1px solid #0d0d1a;color:#e8e8f0;font-size:9px;font-family:"Share Tech Mono",monospace;letter-spacing:3px}

/* ANIMATED COUNTERS */
.sbar-val{transition:color 0.5s}
@keyframes countup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sbar-val.counting{animation:countup 0.4s ease}

/* CONFETTI */
.confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999;overflow:hidden}
.confetti-piece{position:absolute;width:8px;height:8px;top:-10px;animation:confalldown 1.2s ease-in forwards}
@keyframes confalldown{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* 1RM CALCULATOR */
.orm-box{background:rgba(0,0,0,0.5);border:1px solid;border-radius:0;padding:12px 14px;margin-top:10px;transition:border-color 0.5s}
.orm-title{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.orm-inputs{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.orm-inp{background:rgba(0,0,0,0.7);border:1px solid #2a2a3e;color:#e8e8f0;font-family:"Bebas Neue",sans-serif;font-size:22px;padding:6px 8px;width:100%;text-align:center;outline:none;-webkit-appearance:none;letter-spacing:2px}
.orm-inp::placeholder{color:#333355}
.orm-lbl{font-family:"Share Tech Mono",monospace;font-size:8px;color:#8888aa;letter-spacing:2px;text-align:center;margin-top:3px}
.orm-result{display:none;animation:prpop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.orm-result.show{display:block}
.orm-val{font-family:"Bebas Neue",sans-serif;font-size:42px;letter-spacing:4px;line-height:1}
.orm-sub{font-family:"Share Tech Mono",monospace;font-size:9px;color:#8888aa;letter-spacing:2px;margin-top:3px}
.orm-pcts{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px}
.orm-pct{background:rgba(0,0,0,0.4);border:1px solid #1a1a2e;padding:7px 5px;text-align:center}
.orm-pct-pct{font-family:"Share Tech Mono",monospace;font-size:8px;color:#8888aa;letter-spacing:1px}
.orm-pct-kg{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:2px}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(3,3,8,0.98);border-top:1px solid #222233;display:flex;align-items:stretch;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 2px 13px;background:transparent;border:none;cursor:pointer;color:#666688;font-family:"Share Tech Mono",monospace;font-size:7px;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;position:relative;gap:5px;-webkit-tap-highlight-color:transparent}
.bnav-btn:active{transform:scale(0.92)}
.bnav-btn.active{color:var(--fase-kleur,#00ffb4);background:rgba(0,0,0,0.3)}
.bnav-btn.active .bnav-icon{filter:drop-shadow(0 0 6px var(--fase-kleur,#00ffb4));transform:translateY(-2px)}
.bnav-btn.active::after{content:"";position:absolute;top:0;left:15%;right:15%;height:2px;background:var(--fase-kleur,#00ffb4);box-shadow:0 0 10px var(--fase-kleur,#00ffb4),0 0 20px var(--fase-kleur,#00ffb4);border-radius:0 0 3px 3px}
.bnav-btn.active .bnav-label{color:var(--fase-kleur,#00ffb4)}
.bnav-icon{font-size:20px;line-height:1;transition:all 0.2s}
.bnav-label{font-size:7px;letter-spacing:1px;transition:color 0.2s;color:#888aaa}
</style>
</head>
<body>
<div class="bg-glow"><div class="g1" id="bg1"></div><div class="g2" id="bg2"></div></div>
<div class="scanlines"></div>
<div class="pr-popup" id="prPopup">
  <div style="font-size:32px;margin-bottom:5px">&#127942;</div>
  <h2>NIEUW PR!</h2><p id="prTxt"></p>
  <button class="pr-close" onclick="closePR()">&#10003; NICE</button>
</div>
<div class="reset-overlay" id="resetOverlay">
  <div class="reset-box">
    <div style="font-size:22px;margin-bottom:6px">&#9888;</div>
    <h2>RESET?</h2>
    <p>Dit verwijdert alle data, gewichten, PR's en streak.</p>
    <div class="reset-warn">// DIT KAN NIET ONGEDAAN WORDEN //</div>
    <div class="reset-btns">
      <button class="reset-cancel" onclick="closeReset()">ANNULEER</button>
      <button class="reset-confirm" onclick="doReset()">&#128465; RESET</button>
    </div>
  </div>
</div>
<div class="timer-bar" id="timerBar">
  <div class="timer-inner">
    <div class="timer-info">
      <div class="timer-label">RUST TIMER</div>
      <div class="timer-count" id="timerCount">90</div>
    </div>
    <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div><div class="timer-oef" id="timerOef"></div><button class="timer-skip" onclick="skipTimer()">SKIP &#9654;</button></div>
  </div>
</div>
<div class="page">
<header id="mainHeader" style="display:none"></header>
<div class="wrap">
  <div id="schemaView"></div>
  <div id="logboekView" style="display:none"></div>
  <div id="etenView" style="display:none"></div>
  <div id="statsView" style="display:none"></div>

  <div id="gewichtView" style="display:none"></div>
  <div id="instellingenView" style="display:none"></div>
</div></div>
</div>

<nav class="bottom-nav" id="bottomNav">
  <button class="bnav-btn" id="bnSchema" onclick="setTab('schema')">
    <span class="bnav-icon">&#128203;</span>
    <span class="bnav-label">SCHEMA</span>
  </button>
  <button class="bnav-btn" id="bnLogboek" onclick="setTab('logboek')">
    <span class="bnav-icon">&#128221;</span>
    <span class="bnav-label">LOGBOEK</span>
  </button>
  <button class="bnav-btn" id="bnEten" onclick="setTab('eten')">
    <span class="bnav-icon">&#129367;</span>
    <span class="bnav-label">ETEN</span>
  </button>
  <button class="bnav-btn" id="bnStats" onclick="setTab('stats')">
    <span class="bnav-icon">&#128200;</span>
    <span class="bnav-label">STATS</span>
  </button>
  <button class="bnav-btn" id="bnVersus" onclick="setTab('versus')">
    <span class="bnav-icon">&#9876;</span>
    <span class="bnav-label">VS</span>
  </button>
  <button class="bnav-btn" id="bnGewicht" onclick="setTab('gewicht')">

    <span class="bnav-label">INST.</span>
  </button>
</nav>

// AUDIO
function beep(freq,dur,vol,type){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;o.type=type||"square";
    g.gain.setValueAtTime(vol||0.08,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+(dur||0.1));
    o.start(ctx.currentTime);o.stop(ctx.currentTime+(dur||0.1));
  }catch(e){}
}

function checkPR(f,d,o,kg){
  if(!kg||isNaN(parseFloat(kg)))return false;
  var prs=gp();var key=prk(f,d,o);var old=prs[key]||0;
  if(parseFloat(kg)>parseFloat(old)){prs[key]=parseFloat(kg);sp(prs);return true;}
  return false;
}

// FASE PROGRESS
function getFaseProgress(fase){
  var weken=FASE_WEKEN[fase];var schema=FASE_DATA[fase].schema;var logs=gl();var total=0;var done=0;
  for(var wi=0;wi<weken.length;wi++){var w=weken[wi];for(var di=0;di<schema.length;di++){for(var oi=0;oi<schema[di].oefeningen.length;oi++){for(var si=0;si<schema[di].oefeningen[oi].sets;si++){total++;if((logs[lk(fase,w,di,oi,si)]||{}).done)done++;}}}}
  return total>0?Math.round((done/total)*100):0;
}

// CHART
function drawChart(fase,dagIdx,oefIdx,weken,color){
  var logs=gl();var oef=FASE_DATA[fase].schema[dagIdx].oefeningen[oefIdx];
  var data=[];var hasData=false;
  for(var wi=0;wi<weken.length;wi++){
    var w=weken[wi];var maxKg=0;
    for(var s=0;s<oef.sets;s++){var log=logs[lk(fase,w,dagIdx,oefIdx,s)]||{};if(log.kg&&parseFloat(log.kg)>maxKg)maxKg=parseFloat(log.kg);}
    if(maxKg>0)hasData=true;
    data.push({w:w,kg:maxKg});
  }
  if(!hasData)return "<div style=\"font-family:'Share Tech Mono',monospace;font-size:9px;color:#888aaa;padding:8px 0;text-align:center;letter-spacing:2px\">// Nog geen data //</div>";
  var W=280,H=86,PL=26,PR=7,PT=16,PB=18;var plotW=W-PL-PR;var plotH=H-PT-PB;
  var maxV=0,minV=9999;
  for(var i=0;i<data.length;i++){if(data[i].kg>maxV)maxV=data[i].kg;if(data[i].kg>0&&data[i].kg<minV)minV=data[i].kg;}
  if(minV===9999)minV=0;if(maxV===minV)minV=Math.max(0,maxV-5);var range=maxV-minV||1;
  var pts=[];var step=plotW/(data.length-1||1);
  for(var i=0;i<data.length;i++){
    var x=PL+i*step;
    var y=data[i].kg>0?PT+plotH-(((data[i].kg-minV)/range)*plotH):PT+plotH;
    pts.push({x:x,y:y,kg:data[i].kg,w:data[i].w});
  }
  var lp="",ap="",first=true;
  for(var i=0;i<pts.length;i++){
    if(pts[i].kg>0){
      if(first){lp="M"+pts[i].x+","+pts[i].y;ap="M"+pts[i].x+","+(PT+plotH)+" L"+pts[i].x+","+pts[i].y;first=false;}
      else{lp+=" L"+pts[i].x+","+pts[i].y;ap+=" L"+pts[i].x+","+pts[i].y;}
    }
  }
  if(ap)ap+=" L"+pts[pts.length-1].x+","+(PT+plotH)+" Z";
  var gid="g"+Math.floor(Math.random()*99999);
  var Q='"';
  var s="<svg width="+Q+"100%"+Q+" viewBox="+Q+"0 0 "+W+" "+H+Q+" xmlns="+Q+"http://www.w3.org/2000/svg"+Q+" style="+Q+"display:block;overflow:visible"+Q+">";
  s+="<defs><linearGradient id="+Q+gid+Q+" x1="+Q+"0"+Q+" y1="+Q+"0"+Q+" x2="+Q+"0"+Q+" y2="+Q+"1"+Q+"><stop offset="+Q+"0%"+Q+" stop-color="+Q+color+Q+" stop-opacity="+Q+"0.18"+Q+"/><stop offset="+Q+"100%"+Q+" stop-color="+Q+color+Q+" stop-opacity="+Q+"0"+Q+"/></linearGradient></defs>";

// ANIMATED COUNTER-----------------------------------------------------
var counterTargets = {};
var counterFrames = {};

function animateCounter(elId, target, suffix) {
  suffix = suffix || '';
  var el = document.getElementById(elId);
  if (!el) return;
  var current = 0;
  var start = Date.now();
  var duration = 600;
  el.classList.add('counting');
  if (counterFrames[elId]) cancelAnimationFrame(counterFrames[elId]);
  function step() {
    var elapsed = Date.now() - start;
    var progress = Math.min(elapsed / duration, 1);
    // Ease out cubic
    var ease = 1 - Math.pow(1 - progress, 3);
    var val = Math.round(ease * target);
    el.textContent = val > 999 ? (Math.round(val/100)/10) + 'k' : val + suffix;
    if (progress < 1) {
      counterFrames[elId] = requestAnimationFrame(step);
    } else {
      el.textContent = target > 999 ? (Math.round(target/100)/10) + 'k' : target + suffix;
      el.classList.remove('counting');
    }
  }
  counterFrames[elId] = requestAnimationFrame(step);
}

// 1RM CALCULATOR--------------------------------------------------------
var ormKg = '';
var ormReps = '';

function calcORM(oefIdx, dagIdx) {
  var c = FASE_DATA[activeFase].kleur;
  var g = FASE_DATA[activeFase].glow;
  var kg = parseFloat(document.getElementById('ormKg_' + dagIdx + '_' + oefIdx).value) || 0;
  var reps = parseInt(document.getElementById('ormReps_' + dagIdx + '_' + oefIdx).value) || 0;
  var resultEl = document.getElementById('ormResult_' + dagIdx + '_' + oefIdx);
  if (!resultEl) return;
  if (kg <= 0 || reps <= 0) { resultEl.classList.remove('show'); return; }
  // Epley formula: 1RM = kg * (1 + reps/30)
  var orm = kg * (1 + reps / 30);
  orm = Math.round(orm * 2.5) / 2.5; // round to nearest 2.5
  // Percentages
  var pcts = [[100,'1RM'],[95,'2-3x'],[90,'5x'],[85,'6x'],[80,'8x'],[75,'10x'],[70,'12x'],[65,'15x']];
  var html = '<div class="orm-val" style="color:' + c + ';text-shadow:0 0 12px ' + g + '">' + orm.toFixed(1) + ' <span style="font-size:22px">kg</span></div>';
  html += '<div class="orm-sub">THEORETISCH 1 REP MAX (EPLEY)</div>';
  html += '<div class="orm-pcts">';
  pcts.forEach(function(p) {
    var w = Math.round(orm * p[0] / 100 * 4) / 4; // round to 0.25
    html += '<div class="orm-pct" style="border-color:' + c + '33">';
    html += '<div class="orm-pct-pct">' + p[0] + '% &middot; ' + p[1] + '</div>';
    html += '<div class="orm-pct-kg" style="color:' + c + '">' + w.toFixed(1) + '</div>';
    html += '</div>';
  });
  html += '</div>';
  resultEl.innerHTML = html;
  resultEl.classList.add('show');
  beepSet();
}

var LEVELS=[
  {naam:"BEGINNER",min:0,kleur:"#666688"},
  {naam:"INTERMEDIATE",min:10000,kleur:"#00ffb4"},
  {naam:"ADVANCED",min:50000,kleur:"#00b4ff"},
  {naam:"ELITE",min:150000,kleur:"#ff2200"},
  {naam:"LEGEND",min:500000,kleur:"#ffd700"}
];

function getTotalVolume(){
  var logs=gl();var v=0;
  for(var k in logs){if(logs[k]&&logs[k].kg&&logs[k].reps)v+=parseFloat(logs[k].kg||0)*parseFloat(logs[k].reps||0);}
  return Math.round(v);
}

function getLevel(){
  var vol=getTotalVolume();
  var level=LEVELS[0];
  for(var i=0;i<LEVELS.length;i++){if(vol>=LEVELS[i].min)level=LEVELS[i];}
  return level;
}

function getLevelProgress(){
  var vol=getTotalVolume();
  var ci=0;
  for(var i=0;i<LEVELS.length;i++){if(vol>=LEVELS[i].min)ci=i;}
  if(ci>=LEVELS.length-1)return 100;
  var current=LEVELS[ci].min;var next=LEVELS[ci+1].min;
  return Math.round(((vol-current)/(next-current))*100);
}

function drawVolumeChart(color){
  var logs=gl();
  var weken=[];
  for(var f in FASE_WEKEN){FASE_WEKEN[f].forEach(function(w){weken.push(w);});}
  weken.sort(function(a,b){return a-b;});
  var data=[];var hasData=false;
  weken.forEach(function(w){
    var vol=0;
    for(var key in logs){
      if(key.indexOf("_w"+w+"_")>-1&&logs[key]&&logs[key].kg&&logs[key].reps){
        vol+=parseFloat(logs[key].kg||0)*parseFloat(logs[key].reps||0);
      }
    }
    if(vol>0)hasData=true;
    data.push({w:w,vol:Math.round(vol)});
  });
  if(!hasData)return "<div style='font-family:\"Share Tech Mono\",monospace;font-size:9px;color:#7777aa;padding:12px 0;text-align:center;letter-spacing:2px'>// Begin met trainen om je volume te zien groeien //</div>";
  var W=300,H=100,PL=36,PR=8,PT=14,PB=20;var plotW=W-PL-PR;var plotH=H-PT-PB;
  var maxV=1;data.forEach(function(d){if(d.vol>maxV)maxV=d.vol;});
  var barW=Math.max(3,Math.floor(plotW/data.length)-2);
  var Q='"';
  var svg="<svg width="+Q+"100%"+Q+" viewBox="+Q+"0 0 "+W+" "+H+Q+" xmlns="+Q+"http://www.w3.org/2000/svg"+Q+" style="+Q+"display:block"+Q+">";
  var gid="vg"+Math.floor(Math.random()*9999);
  svg+="<defs><linearGradient id="+Q+gid+Q+" x1="+Q+"0"+Q+" y1="+Q+"0"+Q+" x2="+Q+"0"+Q+" y2="+Q+"1"+Q+"><stop offset="+Q+"0%"+Q+" stop-color="+Q+color+Q+" stop-opacity="+Q+"0.8"+Q+"/><stop offset="+Q+"100%"+Q+" stop-color="+Q+color+Q+" stop-opacity="+Q+"0.3"+Q+"/></linearGradient></defs>";
  // Y axis
  svg+="<line x1="+Q+PL+Q+" y1="+Q+PT+Q+" x2="+Q+PL+Q+" y2="+Q+(PT+plotH)+Q+" stroke="+Q+"#1a1a2e"+Q+" stroke-width="+Q+"1"+Q+"/>";
  svg+="<line x1="+Q+PL+Q+" y1="+Q+(PT+plotH)+Q+" x2="+Q+(W-PR)+Q+" y2="+Q+(PT+plotH)+Q+" stroke="+Q+"#1a1a2e"+Q+" stroke-width="+Q+"1"+Q+"/>";
  var maxLabel=maxV>999?(Math.round(maxV/100)/10)+"k":maxV;
  svg+="<text x="+Q+(PL-3)+Q+" y="+Q+(PT+6)+Q+" text-anchor="+Q+"end"+Q+" font-family="+Q+"Share Tech Mono"+Q+" font-size="+Q+"7"+Q+" fill="+Q+"#7777aa"+Q+">"+maxLabel+"</text>";
  svg+="<text x="+Q+(PL-3)+Q+" y="+Q+(PT+plotH)+Q+" text-anchor="+Q+"end"+Q+" font-family="+Q+"Share Tech Mono"+Q+" font-size="+Q+"7"+Q+" fill="+Q+"#7777aa"+Q+">0</text>";
  data.forEach(function(d,i){
    var x=PL+Math.round(i*(plotW/data.length))+(Math.floor(plotW/data.length)-barW)/2;
    var h=d.vol>0?Math.max(2,Math.round((d.vol/maxV)*plotH)):0;
    var y=PT+plotH-h;
    if(h>0){
      svg+="<rect x="+Q+x+Q+" y="+Q+y+Q+" width="+Q+barW+Q+" height="+Q+h+Q+" fill="+Q+"url(#"+gid+")"+Q+" rx="+Q+"1"+Q+"/>";
    }
    svg+="<text x="+Q+(x+barW/2)+Q+" y="+Q+(PT+plotH+12)+Q+" text-anchor="+Q+"middle"+Q+" font-family="+Q+"Share Tech Mono"+Q+" font-size="+Q+"6"+Q+" fill="+Q+"#7777aa"+Q+">W"+d.w+"</text>";
  });
  svg+="</svg>";
  return svg;
}

  rug:["Pull-ups","Pull-ups (assisted/band)","Barbell Row","DB Renegade Row","DB Row","Chest-Supported Row (DB)","Weighted Pull-ups","DB Row (heavy)","Band Pull-Apart","Superset: Bench + Row","Face Pulls (band)"],

  core:["Plank","Ab Wheel / Dragon Flag","Hanging Leg Raise","Ab Wheel Rollout","Dead Bug","Pallof Press (band)","Mobiliteit / stretching","KB Turkish Get-Up"]
};

function getTrainedMuscles(){
  var logs=gl();var trained={};
  var today=new Date();var weekAgo=new Date(today-7*86400000).toDateString();
  // Find all oefeningen done this week
  for(var key in logs){
    if(!logs[key]||!logs[key].done)continue;
    var dateStr=logs[key].date||"";
    if(!dateStr)continue;
    // Find oefening name from key f_wW_dD_oO_sS
    var parts=key.split("_");
    if(parts.length<5)continue;
    var fase=parts[0];var dagIdx=parseInt(parts[2].replace("d",""));var oefIdx=parseInt(parts[3].replace("o",""));
    try{
      var oef=FASE_DATA[fase].schema[dagIdx].oefeningen[oefIdx];
      if(!oef)continue;
      for(var sg in SPIERGROEPEN){
        if(SPIERGROEPEN[sg].indexOf(oef.naam)>-1){trained[sg]=(trained[sg]||0)+1;}
      }
    }catch(ex){}
  }
  return trained;
}

function closeWelcome(){
  var naam=document.getElementById("wNaam").value.trim()||"Sporter";
  var gew=parseFloat(document.getElementById("wGewicht").value)||80;
  var doel=document.getElementById("wDoel").value;
  // Calculate calorie target
  var bmr=10*gew+6.25*165-5*28-161; // Mifflin-St Jeor voor vrouw (165cm, 28jr schatting)
  var tdee=Math.round(bmr*1.55); // moderate active
  var kcalTarget=doel==="afvallen"?tdee-400:doel==="bulk"?tdee+300:tdee;
  // Round to nearest 100
  kcalTarget=Math.round(kcalTarget/100)*100;
  // Clamp to available options
  var options=[1250,1500,1750,2000];
  var best=options[0];var bestDiff=Math.abs(kcalTarget-options[0]);
  options.forEach(function(o){if(Math.abs(kcalTarget-o)<bestDiff){bestDiff=Math.abs(kcalTarget-o);best=o;}});
  saveUserProfile({naam:naam,gewicht:gew,doel:doel,kcalTarget:best,tdee:tdee});
  activeKcal=best;
  var el=document.getElementById("welcomeScreen");
  if(el)el.style.display="none";
  render();
  // Show result
  setTimeout(function(){
    var msg="Welkom "+naam+"! Op basis van "+gew+"kg en doel '"+doel+"' raden we "+best+" kcal/dag aan.";
    alert(msg);
  },300);
}

// ================================================================
// DELOAD DETECTOR
// ================================================================
function checkDeload(){
  var logs=gl();var weekCounts={};
  for(var key in logs){
    if(!logs[key]||!logs[key].done)continue;
    var parts=key.split("_");if(parts.length<5)continue;
    var w=parts[1];weekCounts[w]=(weekCounts[w]||0)+1;
  }
  var weeks=Object.keys(weekCounts).sort();
  if(weeks.length<4)return false;
  var last4=weeks.slice(-4);
  var counts=last4.map(function(w){return weekCounts[w]||0;});
  var avg=counts.reduce(function(a,b){return a+b;},0)/counts.length;
  return avg>10;
}

function getWeekStats(weekOffset){
  var logs=gl();var prs=gp();
  var now=new Date();var day=now.getDay();var monday=new Date(now);
  monday.setDate(now.getDate()-(day===0?6:day-1)-(weekOffset*7));
  var sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  var sets=0;var vol=0;var prCount=0;
  for(var key in logs){
    if(!logs[key]||!logs[key].done)continue;
    var d=new Date(logs[key].date||"");
    if(isNaN(d.getTime()))continue;
    if(d>=monday&&d<=sunday){
      sets++;
      if(logs[key].kg&&logs[key].reps) vol+=parseFloat(logs[key].kg||0)*parseFloat(logs[key].reps||0);
    }
  }
  return {sets:sets,vol:Math.round(vol)};
}

(function(){
  var touchStartX=0;var touchStartY=0;var swiping=false;
  var TABS=["schema","logboek","eten"];

  document.addEventListener("touchstart",function(e){
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
    swiping=true;
  },{passive:true});

  document.addEventListener("touchend",function(e){
    if(!swiping)return;
    var dx=e.changedTouches[0].clientX-touchStartX;
    var dy=e.changedTouches[0].clientY-touchStartY;
    // Only horizontal swipes with enough distance and mostly horizontal
    if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx)*0.8){swiping=false;return;}
    var idx=TABS.indexOf(activeTab);
    if(dx<0&&idx<TABS.length-1){
      // Swipe left - next tab
      setTab(TABS[idx+1]);
      showSwipeIndicator("left");
    }else if(dx>0&&idx>0){
      // Swipe right - prev tab
      setTab(TABS[idx-1]);
      showSwipeIndicator("right");
    }
    swiping=false;
  },{passive:true});
})();

function showSwipeIndicator(dir){
  var el=document.getElementById("swipeIndicator");

    el=document.createElement("div");

    el.style.cssText="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:90;font-family:\"Bebas Neue\",sans-serif;font-size:48px;letter-spacing:4px;pointer-events:none;opacity:0;transition:opacity 0.15s";

function closeProfielMenuOutside(e){
  var menu=document.getElementById("profielMenu");
  if(menu&&!menu.contains(e.target)&&e.target.id!=="profielFotoBtn"){
    closeProfielMenu();
  }
}

function closeProfielMenu(){
  var el=document.getElementById("profielMenu");
  if(el){el.parentNode.removeChild(el);}
}

function handleFotoUpload(event){
  var file=event.target.files[0];
  if(!file)return;
  closeProfielMenu();
  var reader=new FileReader();
  reader.onload=function(e){
    // Resize image to max 200px to save storage
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement("canvas");
      var max=200;var w=img.width;var h=img.height;
      if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}
      else{if(h>max){w=Math.round(w*max/h);h=max;}}
      canvas.width=w;canvas.height=h;
      var ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      var dataUrl=canvas.toDataURL("image/jpeg",0.85);
      saveProfielFoto(dataUrl);
      renderProfielFoto();
      // Confetti!
      launchConfetti&&launchConfetti();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function verwijderFoto(){
  closeProfielMenu();

  renderProfielFoto();
}

function drawGewichtChart(entries,log,color,glow){
  if(entries.length<2)return "";
  var W=290,H=90,PL=34,PR=8,PT=14,PB=20;var plotW=W-PL-PR;var plotH=H-PT-PB;
  var vals=entries.map(function(k){return log[k];});
  var minV=Math.min.apply(null,vals)-0.5;var maxV=Math.max.apply(null,vals)+0.5;
  var range=maxV-minV||1;
  var step=plotW/(entries.length-1);
  var pts=entries.map(function(k,i){
    return {x:PL+i*step,y:PT+plotH-((log[k]-minV)/range)*plotH,v:log[k]};
  });
  var lp=pts.map(function(p,i){return (i===0?"M":"L")+p.x+","+p.y;}).join(" ");
  var ap="M"+pts[0].x+","+(PT+plotH)+" "+lp+" L"+pts[pts.length-1].x+","+(PT+plotH)+" Z";
  var Q='"';var gid="gw"+Math.floor(Math.random()*9999);
  var s="<svg width="+Q+"100%"+Q+" viewBox="+Q+"0 0 "+W+" "+H+Q+" xmlns="+Q+"http://www.w3.org/2000/svg"+Q+" style="+Q+"display:block"+Q+">";
  s+="<defs><linearGradient id="+Q+gid+Q+" x1="+Q+"0"+Q+" y1="+Q+"0"+Q+" x2="+Q+"0"+Q+" y2="+Q+"1"+Q+"><stop offset="+Q+"0%"+Q+" stop-color="+Q+color+Q+" stop-opacity="+Q+"0.2"+Q+"/><stop offset="+Q+"100%"+Q+" stop-color="+Q+color+Q+" stop-opacity="+Q+"0"+Q+"/></linearGradient></defs>";
  s+="<line x1="+Q+PL+Q+" y1="+Q+PT+Q+" x2="+Q+PL+Q+" y2="+Q+(PT+plotH)+Q+" stroke="+Q+"#1a1a2e"+Q+" stroke-width="+Q+"1"+Q+"/>";
  s+="<line x1="+Q+PL+Q+" y1="+Q+(PT+plotH)+Q+" x2="+Q+(W-PR)+Q+" y2="+Q+(PT+plotH)+Q+" stroke="+Q+"#1a1a2e"+Q+" stroke-width="+Q+"1"+Q+"/>";
  s+="<text x="+Q+(PL-3)+Q+" y="+Q+(PT+5)+Q+" text-anchor="+Q+"end"+Q+" font-family="+Q+"Share Tech Mono"+Q+" font-size="+Q+"7"+Q+" fill="+Q+"#7777aa"+Q+">"+maxV.toFixed(1)+"</text>";
  s+="<text x="+Q+(PL-3)+Q+" y="+Q+(PT+plotH)+Q+" text-anchor="+Q+"end"+Q+" font-family="+Q+"Share Tech Mono"+Q+" font-size="+Q+"7"+Q+" fill="+Q+"#7777aa"+Q+">"+minV.toFixed(1)+"</text>";
  s+="<path d="+Q+ap+Q+" fill="+Q+"url(#"+gid+")"+Q+"/>";
  s+="<path d="+Q+lp+Q+" fill="+Q+"none"+Q+" stroke="+Q+color+Q+" stroke-width="+Q+"2"+Q+" stroke-linecap="+Q+"round"+Q+" stroke-linejoin="+Q+"round"+Q+"/>";
  pts.forEach(function(p,i){
    s+="<circle cx="+Q+p.x+Q+" cy="+Q+p.y+Q+" r="+Q+"2.5"+Q+" fill="+Q+color+Q+" stroke="+Q+"#030308"+Q+" stroke-width="+Q+"1.5"+Q+"/>";
    if(i===0||i===pts.length-1)s+="<text x="+Q+p.x+Q+" y="+Q+(p.y-5)+Q+" text-anchor="+Q+"middle"+Q+" font-family="+Q+"Bebas Neue"+Q+" font-size="+Q+"10"+Q+" fill="+Q+color+Q+">"+p.v+"</text>";
  });
  s+="</svg>";return s;
}

function getProgressieSuggestie(fase,dagIdx,oefIdx){
  var logs=gl();var weken=FASE_WEKEN[fase];var oef=FASE_DATA[fase].schema[dagIdx].oefeningen[oefIdx];
  // Collect last 2 weeks data
  var weekData=[];
  weken.forEach(function(w){
    var setData=[];
    for(var s=0;s<oef.sets;s++){
      var log=logs[lk(fase,w,dagIdx,oefIdx,s)]||{};
      if(log.kg&&log.reps&&log.done)setData.push({kg:parseFloat(log.kg),reps:parseInt(log.reps)});
    }
    if(setData.length>0)weekData.push({w:w,sets:setData});
  });
  if(weekData.length<1)return null;
  var last=weekData[weekData.length-1];
  var avgReps=last.sets.reduce(function(a,b){return a+b.reps;},0)/last.sets.length;
  var avgKg=last.sets.reduce(function(a,b){return a+b.kg;},0)/last.sets.length;
  var targetReps=parseInt(oef.reps)||10;
  if(isNaN(targetReps))targetReps=10;
  // If avg reps >= target, suggest weight increase
  if(avgReps>=targetReps){
    var increase=avgKg<20?2.5:avgKg<60?2.5:5;
    return {type:"zwaarder",huidig:avgKg,nieuw:avgKg+increase,reden:"Je haalt consistent "+Math.round(avgReps)+" reps. Tijd om "+increase+"kg zwaarder te gaan!"};
  }
  // If only 1 week data and doing well
  if(weekData.length===1&&avgReps>=targetReps-1){
    return {type:"goed",huidig:avgKg,reden:"Goed bezig! Probeer volgende week "+avgKg+"kg te halen voor alle sets."};
  }
  // If multiple weeks and improving
  if(weekData.length>=2){
    var prev=weekData[weekData.length-2];
    var prevKg=prev.sets.reduce(function(a,b){return a+b.kg;},0)/prev.sets.length;
    if(avgKg>prevKg){
      return {type:"progressie",huidig:avgKg,reden:"Mooi! +"+Math.round((avgKg-prevKg)*10)/10+"kg t.o.v. vorige week. Blijf dit tempo aan."};
    }
  }
  return null;
}

var warmupTimerActive=false;var warmupStep=0;var warmupInterval=null;var warmupItems=[];var warmupStepTime=0;var warmupStepTotal=30;

function startWarmupTimer(dagIdx){
  var wu=WARMUP_DATA[activeFase];if(!wu||!wu[dagIdx])return;
  warmupItems=wu[dagIdx];warmupStep=0;warmupTimerActive=true;
  showWarmupStep();
}

function showWarmupStep(){
  if(warmupStep>=warmupItems.length){stopWarmupTimer();return;}
  var el=document.getElementById("warmupTimerBox");
  if(!el){
    el=document.createElement("div");
    el.id="warmupTimerBox";
    el.style.cssText="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;background:#030308;border:2px solid;padding:26px 22px;text-align:center;max-width:300px;width:90%;backdrop-filter:blur(12px)";
    document.body.appendChild(el);
  }
  var c=FASE_DATA[activeFase].kleur;var g=FASE_DATA[activeFase].glow;
  el.style.borderColor=c;el.style.boxShadow="0 0 40px "+g;
  warmupStepTime=warmupStepTotal;
  el.innerHTML=[
    "<div style='font-family:\"Share Tech Mono\",monospace;font-size:9px;color:"+c+";letter-spacing:3px;margin-bottom:8px'>WARMING UP "+(warmupStep+1)+"/"+warmupItems.length+"</div>",
    "<div style='font-family:\"Share Tech Mono\",monospace;font-size:13px;color:#e8e8f0;margin-bottom:16px;line-height:1.5'>"+warmupItems[warmupStep]+"</div>",
    "<div id='wuCount' style='font-family:\"Bebas Neue\",sans-serif;font-size:52px;letter-spacing:4px;color:"+c+";text-shadow:0 0 20px "+g+";line-height:1'>"+warmupStepTotal+"</div>",
    "<div style='background:#1a1a2e;height:4px;border-radius:2px;margin:12px 0'><div id='wuFill' style='height:4px;border-radius:2px;background:"+c+";width:100%;transition:width 1s linear'></div></div>",
    "<div style='display:flex;gap:8px;justify-content:center'>",
    "<button onclick='skipWarmupStep()' style='padding:8px 18px;background:transparent;border:1px solid #2a2a3e;color:#8888aa;font-family:\"Share Tech Mono\",monospace;font-size:9px;cursor:pointer;letter-spacing:2px'>SKIP</button>",
    "<button onclick='stopWarmupTimer()' style='padding:8px 16px;background:transparent;border:1px solid #ff333444;color:#ff7777;font-family:\"Share Tech Mono\",monospace;font-size:9px;cursor:pointer;letter-spacing:2px'>STOP</button>",
    "</div>"
  ].join("");
  if(warmupInterval)clearInterval(warmupInterval);
  warmupInterval=setInterval(function(){
    warmupStepTime--;
    var ce=document.getElementById("wuCount");var fe=document.getElementById("wuFill");
    if(ce)ce.textContent=warmupStepTime;
    if(fe)fe.style.width=Math.round((warmupStepTime/warmupStepTotal)*100)+"%";
    if(warmupStepTime<=3&&warmupStepTime>0)beep(400,0.1,0.07);
    if(warmupStepTime<=0){
      clearInterval(warmupInterval);warmupInterval=null;
      warmupStep++;
      if(warmupStep<warmupItems.length){
        beep(800,0.08,0.1);setTimeout(function(){beep(1000,0.1,0.1);},120);
        showWarmupStep();
      }else{
        stopWarmupTimer();
        beepPR();
      }
    }
  },1000);
}
function skipWarmupStep(){
  if(warmupInterval)clearInterval(warmupInterval);
  warmupStep++;showWarmupStep();
}
function stopWarmupTimer(){
  if(warmupInterval)clearInterval(warmupInterval);
  warmupTimerActive=false;
  var el=document.getElementById("warmupTimerBox");if(el)el.remove();
}

function exportNotities(){
  var notes=gn();var logs=gl();var prs=gp();
  var pd=getPartnerData();var naam=activePartner==="main"?pd.main.naam:pd.partner.naam;
  var lines=["THUIS KRACHT - TRAININGSNOTITIES","Profiel: "+naam,"Gegenereerd: "+new Date().toLocaleDateString("nl-NL"),"","=".repeat(40),""];
  // PR's
  lines.push("PERSOONLIJKE RECORDS:");
  for(var key in prs){
    var parts=key.split("_");if(parts.length<4)continue;
    var fase=parts[1];var dagIdx=parseInt(parts[3].replace("d",""));var oefIdx=parseInt(parts[4]?parts[4].replace("o",""):parts[3].replace("d",""));
    try{
      var oef=FASE_DATA[fase]&&FASE_DATA[fase].schema[dagIdx]&&FASE_DATA[fase].schema[dagIdx].oefeningen[oefIdx];
      if(oef)lines.push("  "+oef.naam+": "+prs[key]+" kg");
    }catch(ex){}
  }
  lines.push("");lines.push("=".repeat(40)+"");lines.push("NOTITIES PER OEFENING:");lines.push("");
  for(var k in notes){
    if(notes[k]&&notes[k].trim()){
      lines.push("- "+k.replace(/_/g," ")+": "+notes[k]);
    }
  }
  var text=lines.join("\n");
  var blob=new Blob([text],{type:"text/plain;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="thuis-kracht-notities.txt";
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
  beepDone&&beepDone();
}

var beatInterval = null;
var beatEnabled = false;

function getBeatEnabled(){try{return localStorage.getItem("beatEnabledV")==="1";}catch(e){return false;}}
function setBeatEnabled(v){try{localStorage.setItem("beatEnabledV",v?"1":"0");}catch(e){}}

function playBeat(){
  if(!getBeatEnabled())return;
  try{
    var ctx = new(window.AudioContext||window.webkitAudioContext)();
    var bpm = 120; var beatTime = 60/bpm;
    // Simple 4/4 kick + hihat pattern
    function kick(t){
      var o=ctx.createOscillator(); var g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.setValueAtTime(150,t);
      o.frequency.exponentialRampToValueAtTime(0.001,t+0.2);
      g.gain.setValueAtTime(0.3,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.start(t); o.stop(t+0.3);
    }
    function hihat(t,vol){
      var buf=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
      var d=buf.getChannelData(0);
      for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
      var src=ctx.createBufferSource(); src.buffer=buf;
      var g=ctx.createGain(); g.gain.setValueAtTime(vol||0.06,t);
      var flt=ctx.createBiquadFilter(); flt.type="highpass"; flt.frequency.value=8000;
      src.connect(flt); flt.connect(g); g.connect(ctx.destination);
      src.start(t);
    }
    var now = ctx.currentTime;
    for(var b=0;b<4;b++){
      var t0 = now + b*beatTime;
      if(b===0||b===2)kick(t0);
      hihat(t0, 0.05);
      hihat(t0 + beatTime/2, 0.03);
    }
  }catch(ex){}
}

function startBeat(){
  stopBeat();
  if(!getBeatEnabled())return;
  playBeat();
  beatInterval = setInterval(playBeat, 2000);
}
function stopBeat(){
  if(beatInterval){clearInterval(beatInterval);beatInterval=null;}
}

function getPlanData(){try{return JSON.parse(localStorage.getItem("trainPlanV")||"{}");}catch(e){return{};}}
function savePlanData(d){try{localStorage.setItem("trainPlanV",JSON.stringify(d));}catch(e){}}

function toggleTrainDay(dateStr){
  var plan = getPlanData();
  plan[dateStr] = !plan[dateStr];
  savePlanData(plan);
  renderPlannerWidget();
}

function renderPlannerWidget(){
  var el = document.getElementById("plannerWidget");
  if(!el)return;
  var c = FASE_DATA[activeFase].kleur; var g = FASE_DATA[activeFase].glow;
  var plan = getPlanData();
  var today = new Date();
  var dow = today.getDay(); var monday = new Date(today);
  monday.setDate(today.getDate() - (dow===0?6:dow-1));
  var dagNamen = ["MA","DI","WO","DO","VR","ZA","ZO"];
  var html = "<div style='font-family:\"Share Tech Mono\",monospace;font-size:9px;color:"+c+";letter-spacing:3px;margin-bottom:9px'>TRAININGSPLANNING DEZE WEEK</div>";
  html += "<div style='display:flex;gap:5px'>";
  for(var i=0;i<7;i++){
    var d = new Date(monday); d.setDate(monday.getDate()+i);
    var ds = d.toDateString();
    var isPast = d < new Date(today.toDateString());
    var isToday = ds === today.toDateString();
    var isPlanned = !!plan[ds];
    var isLogged = false;
    // Check if actually trained this day
    var logs = gl();
    for(var k in logs){
      if(logs[k]&&logs[k].done&&logs[k].date===ds){isLogged=true;break;}
    }
    html += "<button onclick='toggleTrainDay(\""+ds+"\")' style='flex:1;padding:8px 2px;background:"+(isLogged?c+"22":isPlanned?"rgba(255,215,0,0.08)":"rgba(0,0,0,0.4)")+";border:1px solid "+(isLogged?c:isPlanned?"#ffd70066":"#1a1a2e")+";cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px'>";
    html += "<div style='font-family:\"Share Tech Mono\",monospace;font-size:7px;color:"+(isToday?c:isPast?"#555577":"#8888aa")+";letter-spacing:1px'>"+dagNamen[i]+"</div>";
    html += "<div style='font-size:15px'>"+(isLogged?"&#128170;":isPlanned?"&#127919;":"&#9711;")+"</div>";
    html += "<div style='font-family:\"Share Tech Mono\",monospace;font-size:7px;color:#555577'>"+d.getDate()+"</div>";
    html += "</button>";
  }
  html += "</div>";
  html += "<div style='font-family:\"Share Tech Mono\",monospace;font-size:8px;color:#555577;margin-top:6px;letter-spacing:1px'>&#128170; = getraind &nbsp; &#127919; = gepland &nbsp; &#9711; = vrij</div>";
  el.innerHTML = html;
}

// PUSH NOTIFICATIES (rust timer klaar)
// ================================================================
function requestNotifPermission(){
  if(!("Notification" in window))return;
  if(Notification.permission==="default"){
    Notification.requestPermission();
  }
}

function sendTimerNotif(naam){
  if(!("Notification" in window))return;
  if(Notification.permission!=="granted")return;
  try{
    new Notification("Rust klaar! " + (naam||""), {
      body: "Tijd voor de volgende set. Pak het gewicht!",
      icon: "",
      badge: "",
      silent: false,
      tag: "rusttimer"
    });
  }catch(ex){}
}

// ================================================================
// COUNTDOWN NAAR VOLGENDE FASE
// ================================================================
function getCountdownInfo(){
  var weken = FASE_WEKEN[activeFase];
  var targetWeek = weken[weken.length-1]; // last week of current fase
  // Estimate based on streak and current week
  var wekenLeft = targetWeek - activeWeek;
  var dagenLeft = wekenLeft * 7;
  var nextFase = activeFase==="fase1"?"Fase 2 - Opbouw":activeFase==="fase2"?"Fase 3 - Intensiteit":null;
  return {wekenLeft:wekenLeft, dagenLeft:dagenLeft, nextFase:nextFase, targetWeek:targetWeek};
}

function renderCountdown(){
  var el = document.getElementById("countdownBar");
  if(!el)return;
  var c = FASE_DATA[activeFase].kleur; var g = FASE_DATA[activeFase].glow;
  var info = getCountdownInfo();
  if(!info.nextFase){
    el.innerHTML = "<div style='text-align:center;padding:10px;font-family:\"Share Tech Mono\",monospace;font-size:10px;color:"+c+";letter-spacing:2px'>&#127942; FASE 3 ACTIEF - MAXIMALE INTENSITEIT</div>";
    return;
  }
  var prog = FASE_DATA[activeFase];
  var wTotal = FASE_WEKEN[activeFase].length;
  var wDone = FASE_WEKEN[activeFase].indexOf(activeWeek);
  if(wDone<0)wDone=0;
  var pct = Math.round((wDone/wTotal)*100);
  el.innerHTML = [
    "<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:7px'>",
    "<div>",
    "<div style='font-family:\"Share Tech Mono\",monospace;font-size:8px;color:"+c+";letter-spacing:3px;margin-bottom:2px'>"+prog.weken+" &middot; "+prog.label+"</div>",
    "<div style='font-family:\"Share Tech Mono\",monospace;font-size:9px;color:#e8e8f0'>Nog <span style=\"color:"+c+";font-family:\'Bebas Neue\',sans-serif;font-size:18px;letter-spacing:2px\">"+info.wekenLeft+"</span> weken tot "+info.nextFase+"</div>",
    "</div>",
    "<div style='text-align:right'>",
    "<div style='font-family:\"Bebas Neue\",sans-serif;font-size:28px;letter-spacing:3px;color:"+c+";line-height:1'>W"+activeWeek+"</div>",
    "<div style='font-family:\"Share Tech Mono\",monospace;font-size:8px;color:#8888aa'>van "+wTotal+" weken</div>",
    "</div></div>",
    "<div style='background:#1a1a2e;height:4px;border-radius:2px;overflow:hidden'>",
    "<div style='height:4px;background:linear-gradient(90deg,"+c+","+c+"aa);width:"+pct+"%;box-shadow:0 0 8px "+g+";transition:width 0.6s ease;border-radius:2px'></div>",

  html += "<button onclick='document.getElementById(\"museumPanel\").remove()' style='width:36px;height:36px;background:rgba(255,255,255,0.05);border:1px solid #2a2a3e;color:#e8e8f0;font-size:18px;cursor:pointer;flex-shrink:0'>&#8592;</button>";
  html += "<div style='font-family:\"Bebas Neue\",sans-serif;font-size:32px;letter-spacing:4px;color:#fff'>TRAININGSMUSEUM</div>";
  html += "</div>";
  var allWeken = [];
  for(var f in FASE_WEKEN)FASE_WEKEN[f].forEach(function(w){allWeken.push({fase:f,w:w});});
  var logs = gl();
  html += "<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px'>";
  allWeken.forEach(function(item){
    var fase = item.fase; var w = item.w;
    var fc = FASE_DATA[fase].kleur; var fg = FASE_DATA[fase].glow;
    var schema = FASE_DATA[fase].schema;
    var total=0,done=0,vol=0;
    schema.forEach(function(dag,di){
      dag.oefeningen.forEach(function(o,oi){
        for(var s=0;s<o.sets;s++){
          total++;
          var log=logs[lk(fase,w,di,oi,s)]||{};
          if(log.done){done++;if(log.kg&&log.reps)vol+=parseFloat(log.kg)*parseFloat(log.reps);}
        }
      });
    });
    var pct = total>0?Math.round((done/total)*100):0;
    var isComplete = pct===100;
    var volLabel = vol>999?(Math.round(vol/100)/10)+"k":vol;
    html += "<div style='padding:13px;background:rgba(0,0,0,"+(isComplete?"0.7":"0.3")+");border:1px solid "+(isComplete?fc+"66":"#1a1a2e")+";position:relative;overflow:hidden'>";

      html += "<div style='position:absolute;top:-20px;right:-20px;font-size:60px;opacity:0.08'>&#127942;</div>";
    }
    html += "<div style='font-family:\"Bebas Neue\",sans-serif;font-size:28px;letter-spacing:3px;color:"+(isComplete?fc:"#333355")+";line-height:1'>W"+w+"</div>";
    html += "<div style='font-family:\"Share Tech Mono\",monospace;font-size:8px;color:"+(isComplete?fc+"aa":"#333355")+";letter-spacing:1px;margin-bottom:8px'>"+FASE_DATA[fase].weken+"</div>";
    if(isComplete){
      html += "<div style='font-size:20px;margin-bottom:5px'>&#127942;</div>";
      html += "<div style='font-family:\"Share Tech Mono\",monospace;font-size:9px;color:#e8e8f0'>"+done+" sets &middot; "+volLabel+" kg</div>";
      html += "<div style='font-family:\"Share Tech Mono\",monospace;font-size:8px;color:"+fc+";margin-top:3px;letter-spacing:1px'>&#10003; VOLTOOID</div>";
    }else if(done>0){
      html += "<div style='background:#1a1a2e;height:3px;border-radius:2px;margin-bottom:5px'><div style='height:3px;background:"+fc+";width:"+pct+"%'></div></div>";

    }else{
      html += "<div style='font-family:\"Share Tech Mono\",monospace;font-size:9px;color:#333355'>Nog niet begonnen</div>";

    html += "</div>";
  });
  html += "</div>";

function showPRTimeline(){
  var el = document.getElementById("prTimelinePanel");
  if(el){el.remove();return;}
  var c = FASE_DATA[activeFase].kleur; var g = FASE_DATA[activeFase].glow;
  var panel = document.createElement("div");
  panel.id = "prTimelinePanel";
  panel.style.cssText = "position:fixed;inset:0;background:rgba(3,3,8,0.98);z-index:400;overflow-y:auto;padding:20px 14px 100px;backdrop-filter:blur(12px)";
  var prs = gp(); var logs = gl();
  // Build timeline: find when each PR was first logged
  var prEvents = [];
  for(var key in prs){
    var parts = key.replace("pr6_","").split("_");
    if(parts.length<3)continue;
    var fase=parts[0]; var dagIdx=parseInt(parts[1].replace("d",""));var oefIdx=parseInt(parts[2].replace("o",""));
    try{
      var oef=FASE_DATA[fase]&&FASE_DATA[fase].schema[dagIdx]&&FASE_DATA[fase].schema[dagIdx].oefeningen[oefIdx];
      if(!oef)continue;
      // Find date of this PR
      var prDate="Onbekend";
      for(var lKey in logs){
        if(logs[lKey]&&logs[lKey].kg&&parseFloat(logs[lKey].kg)>=parseFloat(prs[key])&&lKey.indexOf(fase+"_")===0){
          prDate=logs[lKey].date||"Onbekend";break;
        }
      }
      prEvents.push({naam:oef.naam,kg:prs[key],date:prDate,fc:FASE_DATA[fase].kleur});
    }catch(ex){}
  }
  var html="";
  html+="<div style='display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #1a1a2e'>";
  html+="<button onclick='document.getElementById(\"prTimelinePanel\").remove()' style='width:36px;height:36px;background:rgba(255,255,255,0.05);border:1px solid #2a2a3e;color:#e8e8f0;font-size:18px;cursor:pointer;flex-shrink:0'>&#8592;</button>";
  html+="<div style='font-family:\"Bebas Neue\",sans-serif;font-size:32px;letter-spacing:4px;color:#fff'>PR TIJDLIJN</div>";
  html+="</div>";
  if(prEvents.length===0){
    html+="<div style='text-align:center;padding:40px 20px;font-family:\"Share Tech Mono\",monospace;font-size:11px;color:#555577;letter-spacing:2px'>// Nog geen PR's - begin met trainen //</div>";
  }else{
    html+="<div style='position:relative'>";
    html+="<div style='position:absolute;left:18px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,"+c+","+c+"22)'></div>";
    prEvents.forEach(function(ev){
      html+="<div style='display:flex;gap:16px;align-items:flex-start;margin-bottom:14px;position:relative'>";
      html+="<div style='width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,0.8);border:2px solid "+ev.fc+";display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 0 10px "+ev.fc+"44;z-index:1'>&#127942;</div>";
      html+="<div style='flex:1;background:rgba(0,0,0,0.5);border:1px solid "+ev.fc+"33;border-left:2px solid "+ev.fc+";padding:10px 12px'>";
      html+="<div style='font-family:\"Share Tech Mono\",monospace;font-size:8px;color:"+ev.fc+";letter-spacing:2px;margin-bottom:3px'>"+ev.date+"</div>";
      html+="<div style='font-size:13px;font-weight:700;color:#e8e8f0;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px'>"+ev.naam+"</div>";
      html+="<div style='font-family:\"Bebas Neue\",sans-serif;font-size:24px;letter-spacing:3px;color:"+ev.fc+"'>"+ev.kg+" <span style=\"font-size:14px\">kg</span></div>";
      html+="</div></div>";
    });
    html+="</div>";
  }
  panel.innerHTML=html;
  document.body.appendChild(panel);
}

// ================================================================
// RANDOM PR CHALLENGE
// ================================================================
function getDailyPRChallenge(){
  var prs = gp();
  var keys = Object.keys(prs);
  if(keys.length===0)return null;
  var day = Math.floor(Date.now()/(1000*60*60*24));
  var key = keys[day%keys.length];
  var parts = key.replace("pr6_","").split("_");
  if(parts.length<3)return null;
  var fase=parts[0];var dagIdx=parseInt(parts[1].replace("d",""));var oefIdx=parseInt(parts[2].replace("o",""));
  try{
    var oef=FASE_DATA[fase]&&FASE_DATA[fase].schema[dagIdx]&&FASE_DATA[fase].schema[dagIdx].oefeningen[oefIdx];
    if(!oef)return null;
    return {naam:oef.naam,kg:prs[key]};
  }catch(ex){return null;}
}

var macroRowCount = 3;
function getMacroRow(i){
  return "<div style='display:grid;grid-template-columns:1fr 60px 60px 60px 60px;gap:6px;margin-bottom:5px' id='mrow"+i+"'>" +
    "<input placeholder='Naam...' style='background:rgba(0,0,0,0.6);border:1px solid #2a2a3e;color:#e8e8f0;font-family:\"Share Tech Mono\",monospace;font-size:10px;padding:5px 7px;outline:none;width:100%' id='mn"+i+"'>" +
    "<input type='number' placeholder='0' style='background:rgba(0,0,0,0.6);border:1px solid #2a2a3e;color:#e8e8f0;font-family:\"Bebas Neue\",sans-serif;font-size:16px;padding:4px 3px;outline:none;width:100%;text-align:center;-webkit-appearance:none' id='mk"+i+"' oninput='calcMacroTotaal()'>" +
    "<input type='number' placeholder='0' style='background:rgba(0,0,0,0.6);border:1px solid #2a2a3e;color:#e8e8f0;font-family:\"Bebas Neue\",sans-serif;font-size:16px;padding:4px 3px;outline:none;width:100%;text-align:center;-webkit-appearance:none' id='me"+i+"' oninput='calcMacroTotaal()'>" +
    "<input type='number' placeholder='0' style='background:rgba(0,0,0,0.6);border:1px solid #facc1544;color:#facc15;font-family:\"Bebas Neue\",sans-serif;font-size:16px;padding:4px 3px;outline:none;width:100%;text-align:center;-webkit-appearance:none' id='mkh"+i+"' oninput='calcMacroTotaal()'>" +
    "<input type='number' placeholder='0' style='background:rgba(0,0,0,0.6);border:1px solid #fb923c44;color:#fb923c;font-family:\"Bebas Neue\",sans-serif;font-size:16px;padding:4px 3px;outline:none;width:100%;text-align:center;-webkit-appearance:none' id='mv"+i+"' oninput='calcMacroTotaal()'>" +
    "</div>";
}
function addMacroRow(){
  var rows = document.getElementById("macroRows");
  if(!rows)return;
  var div = document.createElement("div");
  div.innerHTML = getMacroRow(macroRowCount++);
  rows.appendChild(div.firstChild);
}
function calcMacroTotaal(){
  var tKcal=0,tE=0,tKH=0,tV=0;
  for(var i=0;i<macroRowCount;i++){
    var ke=document.getElementById("mk"+i);var ee=document.getElementById("me"+i);
    var khe=document.getElementById("mkh"+i);var ve=document.getElementById("mv"+i);
    if(ke)tKcal+=parseFloat(ke.value||0);
    if(ee)tE+=parseFloat(ee.value||0);
    if(khe)tKH+=parseFloat(khe.value||0);
    if(ve)tV+=parseFloat(ve.value||0);
  }
  // Also calc from macros if kcal not entered
  var calcKcal = tE*4+tKH*4+tV*9;
  if(tKcal===0)tKcal=calcKcal;
  var el;
  el=document.getElementById("mTkcal");if(el)el.textContent=Math.round(tKcal);
  el=document.getElementById("mTe");if(el)el.textContent=Math.round(tE)+"g";
  el=document.getElementById("mTk");if(el)el.textContent=Math.round(tKH)+"g";
  el=document.getElementById("mTv");if(el)el.textContent=Math.round(tV)+"g";
}

// ================================================================
// PERSOONLIJK VOLUME RECORD
// ================================================================
function getBestWeek(){
  var logs=gl();
  var weekVol={};
  for(var key in logs){
    if(!logs[key]||!logs[key].done||!logs[key].kg||!logs[key].reps)continue;
    var parts=key.split("_");if(parts.length<3)continue;
    var wk=parts[1];
    weekVol[wk]=(weekVol[wk]||0)+parseFloat(logs[key].kg)*parseFloat(logs[key].reps);
  }
  var best=null;var bestVol=0;
  for(var w in weekVol){if(weekVol[w]>bestVol){bestVol=weekVol[w];best=w;}}
  return best?{week:best,vol:Math.round(bestVol)}:null;
}

function getThisWeekVol(){
  var logs=gl();var vol=0;
  var now=new Date();var dow=now.getDay();
  var monday=new Date(now);monday.setDate(now.getDate()-(dow===0?6:dow-1));
  for(var key in logs){
    if(!logs[key]||!logs[key].done||!logs[key].kg||!logs[key].reps)continue;
    var d=new Date(logs[key].date||"");
    if(!isNaN(d.getTime())&&d>=monday)vol+=parseFloat(logs[key].kg)*parseFloat(logs[key].reps);
  }
  return Math.round(vol);
}

    html+="<div style='display:grid;grid-template-columns:repeat(7,1fr);gap:3px'>";

      html+="<div style='font-family:\"Share Tech Mono\",monospace;font-size:7px;color:#555577;text-align:center;padding:2px'>"+l+"</div>";
    });
    // First day offset (Mon=0)
    var firstDay=new Date(year,month,1).getDay();
    var offset=(firstDay+6)%7;
    for(var i=0;i<offset;i++)html+="<div></div>";
    var daysInMonth=new Date(year,month+1,0).getDate();
    for(var day=1;day<=daysInMonth;day++){
      var date=new Date(year,month,day);
      var ds=date.toDateString();
      var trained=!!trainedDates[ds];
      var isFuture=date>today;
      var isToday=ds===today.toDateString();
      html+="<div style='aspect-ratio:1;border-radius:2px;display:flex;align-items:center;justify-content:center;background:"+(trained?c+"33":isFuture?"transparent":"rgba(0,0,0,0.3)")+";border:1px solid "+(isToday?c:trained?c+"66":"#1a1a2e")+";box-shadow:"+(trained?"0 0 6px "+g:"none")+"'>";

      if(trained)html+="<span style='position:absolute;font-size:6px'>&#128170;</span>";
      html+="</div>";
    }
    html+="</div></div>";
  }
  panel.innerHTML=html;
  document.body.appendChild(panel);
}

  // Per fase: volume, sets, PR count
  var faseStats={};
  FASES.forEach(function(f){
    var vol=0;var sets=0;var prCount=0;
    var weken=FASE_WEKEN[f];
    weken.forEach(function(w){
      for(var key in logs){
        if(key.indexOf(f+"_w"+w+"_")===0&&logs[key]&&logs[key].done){
          sets++;

        }
      }
    });
    for(var pk in prs){if(pk.indexOf("pr6_"+f+"_")===0)prCount++;}
    faseStats[f]={vol:Math.round(vol),sets:sets,prs:prCount};
  });
  var maxVol=Math.max(1,faseStats.fase1.vol,faseStats.fase2.vol,faseStats.fase3.vol);
  FASES.forEach(function(f,fi){
    var fs=faseStats[f];var fd=FASE_DATA[f];var fc=fd.kleur;
    var pct=Math.round((fs.vol/maxVol)*100);
    html+="<div style='background:rgba(0,0,0,0.5);border:1px solid "+fc+"44;border-left:3px solid "+fc+";padding:14px;margin-bottom:10px'>";
    html+="<div style='font-family:\"Bebas Neue\",sans-serif;font-size:22px;letter-spacing:3px;color:"+fc+";margin-bottom:3px'>"+fd.label+"</div>";
    html+="<div style='font-family:\"Share Tech Mono\",monospace;font-size:8px;color:#8888aa;letter-spacing:1px;margin-bottom:10px'>"+fd.weken+"</div>";
    html+="<div style='display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px'>";
    [["Sets",fs.sets],["Volume",(fs.vol>999?(Math.round(fs.vol/100)/10)+"k":fs.vol)+" kg"],["PR's",fs.prs]].forEach(function(s){
      html+="<div style='text-align:center'><div style='font-family:\"Bebas Neue\",sans-serif;font-size:20px;letter-spacing:2px;color:"+fc+"'>"+s[1]+"</div><div style='font-family:\"Share Tech Mono\",monospace;font-size:8px;color:#8888aa'>"+s[0]+"</div></div>";

    html+="</div>";
  });
  // Best improvement
  if(faseStats.fase2.vol>faseStats.fase1.vol&&faseStats.fase1.vol>0){

// ================================================================
// HERSTEL SCORE
// ================================================================
function getHerstelScore(){
  var logs=gl();
  var today=new Date();
  // Find last training day
  var lastTrained=null;
  for(var key in logs){
    if(logs[key]&&logs[key].done&&logs[key].date){
      var d=new Date(logs[key].date);
      if(!lastTrained||d>lastTrained)lastTrained=d;
    }
  }
  if(!lastTrained)return{score:10,label:"UITGERUST",kleur:"#00ff88"};
  var daysSince=Math.floor((today-lastTrained)/(1000*60*60*24));
  var streak=gst().count;
  // Score based on rest days and streak
  var score;
  if(daysSince===0)score=streak>5?6:8;
  else if(daysSince===1)score=9;
  else if(daysSince>=2)score=10;
  else score=7;
  // Reduce if streak is very high
  if(streak>7)score=Math.max(5,score-1);
  if(streak>14)score=Math.max(4,score-1);
  var label=score>=9?"UITGERUST":score>=7?"GOED":score>=5?"MATIG":"MOE";
  var kleur=score>=9?"#00ff88":score>=7?"#ff00cc":score>=5?"#ffd700":"#ff4444";
  return{score:score,label:label,kleur:kleur,daysSince:daysSince};
}
